name: Release

# Cut a release by pushing a tag like `v0.1.0`:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds prebuilt reposkein-indexer binaries for the 4 supported platforms,
# attaches them to a GitHub Release for the tag, then publishes @reposkein/mcp to
# npm at the matching version (postinstall fetches the binary for that version).
#
# Intel macOS (darwin-x64) is intentionally NOT built: all Macs ship Apple Silicon
# since 2020, and GitHub's macos-13 Intel runners are scarce/deprecated (they can
# stall in the queue indefinitely). darwin-arm64 covers current Macs.
#
# PREREQUISITES (one-time, repo owner):
#   - Own/claim the @reposkein npm scope and create an automation token.
#   - Add it as the `NPM_TOKEN` repo secret (the publish job is skipped without it).
#   - The asset names here MUST match mcp/src/indexer/fetchBinary.ts (M4-D1):
#       reposkein-indexer-<platformKey>[.exe], platformKey ∈
#       darwin-arm64, linux-x64, linux-arm64, win32-x64.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

# Opt JavaScript actions that still declare `node20` in their metadata (e.g.
# actions/upload-artifact@v5) into the Node 24 runtime ahead of GitHub's forced
# migration. Clears the deprecation annotations; safe — these actions run
# identically on node24. Remove once the actions ship native node24 metadata.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-binaries:
    name: build ${{ matrix.platform_key }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            platform_key: darwin-arm64
            ext: ""
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform_key: linux-x64
            ext: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform_key: linux-arm64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform_key: win32-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: indexer
      - name: Build release binary
        working-directory: indexer
        run: cargo build --release -p reposkein-indexer --target ${{ matrix.target }}
      - name: Stage renamed artifact
        shell: bash
        run: |
          mkdir -p bin-dist
          cp "indexer/target/${{ matrix.target }}/release/reposkein-indexer${{ matrix.ext }}" \
             "bin-dist/reposkein-indexer-${{ matrix.platform_key }}${{ matrix.ext }}"
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: indexer-${{ matrix.platform_key }}
          path: bin-dist/reposkein-indexer-${{ matrix.platform_key }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build-binaries
    # Only on a tag push — workflow_dispatch (branch ref) just exercises the builds.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: bin-dist
          pattern: indexer-*
          merge-multiple: true
      - name: List artifacts
        run: ls -l bin-dist
      - name: Generate SHA256SUMS
        run: |
          cd bin-dist
          sha256sum reposkein-indexer-* > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS
      - name: Create / update the release with the binaries
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            bin-dist/reposkein-indexer-*
            bin-dist/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true

  publish-npm:
    name: Publish @reposkein/mcp
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: mcp
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      # Build the viz/ SPA (pnpm) BEFORE the mcp build/publish so `bundle-viz.mjs`
      # (run by mcp's `prepare`) can copy viz/dist into dist/viz — otherwise the
      # published tarball would ship without the `reposkein-mcp view` bundle.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: "10.15.0" # keep in sync with viz/package.json packageManager
      - name: Build viz SPA bundle
        working-directory: viz
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
      - name: Derive version from tag
        id: ver
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME}"
          VERSION="${REF#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version ${VERSION}"
      - name: Assert committed package version matches tag
        shell: bash
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "${PKG_VERSION}" != "${{ steps.ver.outputs.version }}" ]; then
            echo "ERROR: package.json version (${PKG_VERSION}) does not match tag (${{ steps.ver.outputs.version }})" >&2
            exit 1
          fi
      - name: Install + build (+ bundle viz)
        run: |
          npm ci
          npm run build
          node scripts/bundle-viz.mjs
      - name: Download SHA256SUMS and bake binary-digests.json
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "v${{ steps.ver.outputs.version }}" -p SHA256SUMS -O SHA256SUMS
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from "node:fs";
          const lines = readFileSync("SHA256SUMS", "utf8").trim().split("\n");
          const map = {};
          for (const line of lines) {
            const m = line.match(/^([0-9a-f]{64})\s+(.+)$/);
            if (m) map[m[2].trim()] = m[1];
          }
          writeFileSync("binary-digests.json", JSON.stringify(map, null, 2) + "\n");
          console.log("binary-digests.json:", JSON.stringify(map, null, 2));
          EOF
      - name: Set package version to the tag
        run: npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version
      # Gate the release on the EXACT artifact that will ship: pack the tarball,
      # unpack it, assert the packaged assets exist + the bin has a shebang, then
      # run the same black-box smoke (launch VIA A SYMLINK as an executable, pipe
      # an MCP `initialize`, assert a JSON-RPC `"result"`). 0.2.0 shipped without
      # a shebang and 0.2.1 with a symlink-broken guard precisely because no step
      # ever ran the packed bin as a process — this is that step.
      - name: Pack + smoke the npm tarball before publishing
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(npm pack --silent)"
          echo "packed: ${TARBALL}"
          WORK="$(mktemp -d)"
          tar -xzf "${TARBALL}" -C "${WORK}"
          PKG="${WORK}/package" # npm tarballs unpack under ./package
          echo "--- packaged tree (top) ---"; ls -la "${PKG}/dist" | head -20
          for f in dist/index.js dist/viz/index.html dist/SKILL.md; do
            test -f "${PKG}/${f}" || { echo "FAIL: packaged tarball missing ${f}" >&2; exit 1; }
            echo "OK present: ${f}"
          done
          SHEBANG="$(head -1 "${PKG}/dist/index.js")"
          echo "--- dist/index.js shebang: ${SHEBANG}"
          case "${SHEBANG}" in
            '#!'*) echo "OK: shebang present" ;;
            *) echo "FAIL: dist/index.js has no shebang (would break a bare bin invocation)" >&2; exit 1 ;;
          esac
          # Install the runtime deps into the unpacked package, exactly as a real
          # `npm install` would, so the bin can resolve its imports. --ignore-scripts
          # skips the postinstall (which would try to fetch a not-yet-published
          # release asset for this tag); we are smoking the bin's startup, not the
          # binary fetch.
          ( cd "${PKG}" && npm install --omit=dev --ignore-scripts --no-audit --no-fund )
          # Symlink + initialize smoke against the UNPACKED tarball bin.
          SMOKE_DIR="$(mktemp -d)"
          ln -s "${PKG}/dist/index.js" "${SMOKE_DIR}/reposkein-mcp"
          OUT="$(printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"0"}}}\n' | timeout 15 "${SMOKE_DIR}/reposkein-mcp" 2>/dev/null)"
          echo "--- response ---"; echo "${OUT}"
          echo "${OUT}" | grep -q '"result"' || { echo "FAIL: packed bin did not answer initialize — refusing to publish" >&2; exit 1; }
          echo "${OUT}" | grep -qE '"serverInfo"|"capabilities"' || { echo "FAIL: result missing serverInfo/capabilities" >&2; exit 1; }
          echo "OK: packed tarball bin answered initialize via symlink — safe to publish"
      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
      - name: Skipped publish (no NPM_TOKEN)
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "::warning::NPM_TOKEN not set — built + versioned but did not publish. Add the NPM_TOKEN secret to enable publishing."
