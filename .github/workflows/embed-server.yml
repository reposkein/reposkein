name: embed-server

# Pre-validates the local embedding server (embed-server/) so it's known-good
# before anyone runs it. Builds + smoke-tests NATIVELY on both x86_64 and ARM64
# runners (no QEMU), both CPU-only (no GPU) — proving it runs on the hardware
# most people have: Apple Silicon / ARM unified-memory and GPU-less Linux, and
# (via the same linux images) Docker Desktop on macOS and Windows.
#
# Path-filtered: only runs when the embed-server changes.
on:
  push:
    paths:
      - "embed-server/**"
      - ".github/workflows/embed-server.yml"
  pull_request:
    paths:
      - "embed-server/**"
      - ".github/workflows/embed-server.yml"
  workflow_dispatch: {}

permissions:
  contents: read

# Opt node20-declaring JavaScript actions into the Node 24 runtime ahead of
# GitHub's forced migration (clears the deprecation annotations; safe).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-smoke:
    name: build + smoke (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, arch: amd64 }
          - { runner: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Build the image (native ${{ matrix.arch }}, CPU-only)
        run: docker build -t reposkein-embed:ci ./embed-server

      # Smoke with a tiny CPU model (all-MiniLM-L6-v2, 384-dim, ~80MB) — no GPU,
      # no trust_remote_code needed — to validate the full serve+encode path
      # without pulling the multi-GB voyage-4-nano weights in CI.
      - name: Run the server
        run: |
          docker run -d --name embed -p 8080:8080 \
            -e EMBED_MODEL=sentence-transformers/all-MiniLM-L6-v2 \
            -e EMBED_DIMS=384 \
            reposkein-embed:ci

      - name: Wait for /health
        run: |
          for i in $(seq 1 40); do
            curl -fsS http://localhost:8080/health && { echo; break; }
            sleep 3
          done
          curl -fsS http://localhost:8080/health

      - name: Embed + assert OpenAI shape and dims (model downloads on first call)
        run: |
          curl -fsS --max-time 600 http://localhost:8080/v1/embeddings \
            -H 'content-type: application/json' \
            -d '{"input":["parse the jwt token","charge the card"],"model":"x","input_type":"document"}' \
            -o resp.json
          python3 - <<'PY'
          import json
          d = json.load(open("resp.json"))
          vecs = [r["embedding"] for r in d["data"]]
          assert len(vecs) == 2, f"expected 2 vectors, got {len(vecs)}"
          assert len(vecs[0]) == 384, f"expected 384 dims, got {len(vecs[0])}"
          assert all(isinstance(x, (int, float)) for x in vecs[0][:8]), "non-numeric embedding"
          print(f"OK: {len(vecs)} vectors x {len(vecs[0])} dims on {('arm64' if __import__('platform').machine() in ('aarch64','arm64') else 'amd64')}")
          PY

      - name: Server logs on failure
        if: failure()
        run: docker logs embed | tail -50

  # Publishes a multi-arch (amd64 + arm64) image to GHCR so people can `docker run`
  # it without building. Uses the workflow's GITHUB_TOKEN (no PAT) — needs the org
  # to allow Actions to write packages. Runs on a manual dispatch or a v* tag.
  publish:
    name: publish multi-arch image to GHCR
    needs: build-and-smoke
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/reposkein-embed
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,format=short
      - name: Build + push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./embed-server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
