name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repo (checkout). No job here
# writes contents, packages, or other scopes — declaring this explicitly
# satisfies the CodeQL "workflow does not contain permissions" check and caps
# the GITHUB_TOKEN regardless of repo/org default-permission settings.
permissions:
  contents: read

# Opt node20-declaring JavaScript actions into the Node 24 runtime ahead of
# GitHub's forced migration (clears the deprecation annotations; safe).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  indexer:
    name: indexer (test + fmt + clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: indexer
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: indexer
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (warnings = errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests (incl. determinism + JSONL round-trip invariants)
        run: cargo test

  indexer-neo4j-roundtrip:
    name: indexer Neo4j round-trip (gated DB tests)
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/reposkeintest
          NEO4J_server_memory_pagecache_size: 256M
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p reposkeintest 'RETURN 1'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 12
          --health-start-period 40s
    defaults:
      run:
        working-directory: indexer
    env:
      NEO4J_URI: neo4j://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: reposkeintest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: indexer
      - name: load -> export byte-identical round-trip (PRD §6.2.7)
        # --test-threads=1: these gated tests share one Neo4j instance and each
        # calls setup_schema (CREATE INDEX IF NOT EXISTS). On a fresh DB, running
        # them in parallel races on index creation (both see "not exists", both
        # create) → EquivalentSchemaRuleAlreadyExists. Serialize them.
        run: cargo test -p reposkein-neo4j-io -- --ignored --test-threads=1

  version-lockstep:
    name: version lockstep (indexer Cargo.toml == mcp package.json)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # A skew here means the npm postinstall would fetch a release asset that
      # doesn't exist (the indexer binary is published per-version). Catch it in
      # CI rather than at a user's `npm install`.
      - name: Assert indexer + mcp versions match
        shell: bash
        run: |
          CARGO_VERSION="$(grep -m1 -E '^version[[:space:]]*=' indexer/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          PKG_VERSION="$(node -p "require('./mcp/package.json').version")"
          echo "indexer Cargo.toml [workspace.package] version = ${CARGO_VERSION}"
          echo "mcp package.json version                       = ${PKG_VERSION}"
          if [ -z "${CARGO_VERSION}" ]; then
            echo "ERROR: could not parse version from indexer/Cargo.toml" >&2
            exit 1
          fi
          if [ "${CARGO_VERSION}" != "${PKG_VERSION}" ]; then
            echo "ERROR: version skew — indexer (${CARGO_VERSION}) != mcp (${PKG_VERSION}). The npm postinstall fetches the per-version indexer binary; a skew points at a nonexistent release asset." >&2
            exit 1
          fi
          echo "OK: versions match (${PKG_VERSION})"

  mcp:
    name: mcp (typecheck + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: "10.15.0" # keep in sync with viz/package.json packageManager
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      # Build the viz SPA + bundle it into dist/viz so the packaged bin is the
      # same artifact that ships to npm (the `view` command needs dist/viz).
      - name: Build + bundle viz
        working-directory: viz
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
      - name: Bundle viz into mcp/dist
        run: node scripts/bundle-viz.mjs
      # Black-box bin smoke: launch reposkein-mcp VIA A SYMLINK (the entry path
      # that broke in 0.2.0 (missing shebang) and 0.2.1 (symlink-broken guard)),
      # invoked as an executable — NO `node` prefix, so a missing shebang fails
      # the build instead of being masked. Pipe an MCP `initialize` and assert a
      # JSON-RPC `"result"` (with serverInfo/capabilities) comes back.
      - name: Bin smoke (symlink + MCP initialize)
        shell: bash
        run: |
          SMOKE_DIR="$(mktemp -d)"
          ln -s "$PWD/dist/index.js" "$SMOKE_DIR/reposkein-mcp"
          echo "--- shebang ---"; head -1 dist/index.js
          OUT="$(printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"0"}}}\n' | timeout 15 "$SMOKE_DIR/reposkein-mcp" 2>/dev/null)"
          echo "--- response ---"; echo "$OUT"
          echo "$OUT" | grep -q '"result"' || { echo "FAIL: no JSON-RPC result from the bin" >&2; exit 1; }
          echo "$OUT" | grep -qE '"serverInfo"|"capabilities"' || { echo "FAIL: result missing serverInfo/capabilities" >&2; exit 1; }
          echo "OK: bin answered initialize via symlink"
      - name: Tests (DB-gated suites skip without NEO4J_PASSWORD)
        run: npm test

  viz:
    name: viz (typecheck + build + test + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viz
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          # Explicit version: action-setup runs at the repo root (working-directory
          # applies only to `run:` steps), where there is no package.json with a
          # `packageManager` field — so it can't auto-detect. Keep in sync with
          # viz/package.json's `packageManager`.
          version: "10.15.0"
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: viz/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
      - name: Build
        run: pnpm run build
      - name: Tests
        run: pnpm run test
      - name: Lint
        run: pnpm run lint
