services:
  neo4j:
    image: neo4j:5-community
    container_name: reposkein-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/reposkeintest
      NEO4J_server_memory_pagecache_size: 256M
    volumes:
      - reposkein-neo4j-data:/data
volumes:
  reposkein-neo4j-data:
